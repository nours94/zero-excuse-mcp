name: Keep zero-excuse-mcp awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping le serveur Render
        run: |
          curl -s -o /dev/null -w "Statut HTTP : %{http_code}\n" \
            https://zero-excuse-mcp.onrender.com/ || true
